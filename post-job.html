<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Visume - Post a Job</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;family=Syne:wght@400..800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "text-muted": "#6B6B80",
                    "surface-dim": "#131318",
                    "primary-container": "#6c5ce7",
                    "on-primary-fixed": "#160066",
                    "border-base": "#1E1E2E",
                    "background": "#0A0A0F",
                    "surface": "#131318",
                    "danger": "#D63031",
                    "text-primary": "#EAEAF0",
                    "surface-container": "#13131A",
                    "card-bg": "#13131A",
                    "secondary": "#46eae5",
                    "secondary-container": "#00cec9",
                    "border-input": "#2A2A3E"
                },
                borderRadius: {
                    DEFAULT: "0.25rem",
                    lg: "0.5rem",
                    xl: "0.75rem",
                    full: "9999px"
                },
                spacing: {
                    xxl: "64px",
                    xs: "8px",
                    sm: "16px",
                    md: "24px",
                    lg: "32px",
                    xl: "48px"
                },
                fontFamily: {
                    "body-sm": ["DM Sans"],
                    "body-md": ["DM Sans"],
                    "body-lg": ["DM Sans"],
                    "headline-sm": ["Syne"],
                    "headline-md": ["Syne"],
                    "headline-lg": ["Syne"],
                    "display": ["Syne"]
                }
            }
        }
    }
</script>
<style>
    body {
        background-color: #0A0A0F;
        color: #EAEAF0;
        font-family: 'DM Sans', sans-serif;
    }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: #0A0A0F;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #2A2A3E;
        border-radius: 10px;
    }
</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-md custom-scrollbar">

<main class="w-full max-w-[720px]">
    <!-- Form Card -->
    <div class="bg-card-bg border border-border-base rounded-xl p-lg md:p-xl shadow-2xl">
        <header class="mb-lg">
            <h1 class="font-display text-headline-lg text-text-primary">Post a New Job</h1>
            <p class="text-text-muted mt-2">Fill in the details to create a new job posting.</p>
        </header>

        <form class="flex flex-col gap-md">
            <!-- Job Title -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Job Title</label>
                <input type="text" placeholder="e.g. Senior React Developer" class="w-full bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all">
            </div>

            <!-- Department -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Department</label>
                <select class="w-full bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all appearance-none">
                    <option value="" disabled selected>Select a department</option>
                    <option value="engineering">Engineering</option>
                    <option value="design">Design</option>
                    <option value="marketing">Marketing</option>
                    <option value="sales">Sales</option>
                    <option value="hr">HR</option>
                    <option value="finance">Finance</option>
                </select>
            </div>

            <!-- Work Mode -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Work Mode</label>
                <div class="flex flex-wrap gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="work_mode" value="remote" class="peer hidden" checked>
                        <div class="px-5 py-2.5 rounded-full border border-border-input text-text-muted peer-checked:bg-primary-container/20 peer-checked:text-primary-container peer-checked:border-primary-container font-medium transition-all">
                            Remote
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="work_mode" value="hybrid" class="peer hidden">
                        <div class="px-5 py-2.5 rounded-full border border-border-input text-text-muted peer-checked:bg-primary-container/20 peer-checked:text-primary-container peer-checked:border-primary-container font-medium transition-all">
                            Hybrid
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="work_mode" value="onsite" class="peer hidden">
                        <div class="px-5 py-2.5 rounded-full border border-border-input text-text-muted peer-checked:bg-primary-container/20 peer-checked:text-primary-container peer-checked:border-primary-container font-medium transition-all">
                            Onsite
                        </div>
                    </label>
                </div>
            </div>

            <!-- Location -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Location</label>
                <input type="text" placeholder="e.g. Hyderabad, India" class="w-full bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all">
            </div>

            <!-- Salary Range -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Salary Range (Yearly)</label>
                <div class="flex gap-4">
                    <input type="text" placeholder="Min ₹" class="w-1/2 bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all">
                    <input type="text" placeholder="Max ₹" class="w-1/2 bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all">
                </div>
            </div>

            <!-- Experience Required -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Experience Required</label>
                <select class="w-full bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all appearance-none">
                    <option value="" disabled selected>Select experience level</option>
                    <option value="fresher">Fresher</option>
                    <option value="1-3">1–3 yrs</option>
                    <option value="3-5">3–5 yrs</option>
                    <option value="5+">5+ yrs</option>
                </select>
            </div>

            <!-- Required Skills -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Required Skills</label>
                <input type="text" placeholder="Type skill + press Enter to add" class="w-full bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all">
                <div class="flex flex-wrap gap-2 mt-2">
                    <span class="flex items-center gap-1 px-3 py-1.5 rounded-full border border-primary-container text-primary-container bg-primary-container/10 text-sm">
                        React <span class="material-symbols-outlined text-[14px] cursor-pointer hover:text-white">close</span>
                    </span>
                    <span class="flex items-center gap-1 px-3 py-1.5 rounded-full border border-primary-container text-primary-container bg-primary-container/10 text-sm">
                        TypeScript <span class="material-symbols-outlined text-[14px] cursor-pointer hover:text-white">close</span>
                    </span>
                </div>
            </div>

            <!-- Job Description -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Job Description</label>
                <textarea rows="6" placeholder="Describe the role, responsibilities, and requirements..." class="w-full bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-primary focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all custom-scrollbar"></textarea>
            </div>

            <!-- Application Deadline -->
            <div class="flex flex-col gap-2">
                <label class="text-label-md text-text-primary font-bold">Application Deadline</label>
                <input type="date" class="w-full bg-surface-container border border-border-input rounded-lg px-4 py-3 text-text-muted focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all [color-scheme:dark]">
            </div>

            <hr class="border-border-base my-sm">

            <!-- Actions -->
            <div class="flex flex-col gap-4">
                <div class="flex flex-col sm:flex-row gap-4 justify-between">
                    <button type="button" class="px-6 py-3 rounded-lg border border-border-input text-text-muted hover:bg-surface-container hover:text-text-primary transition-all font-bold">
                        Save as Draft
                    </button>
                    <button type="button" class="flex items-center justify-center gap-2 bg-primary-container text-white px-6 py-3 rounded-lg font-bold hover:shadow-[0_0_15px_rgba(108,92,231,0.4)] transition-all">
                        <span class="material-symbols-outlined">auto_awesome</span>
                        Post Job & Generate AI Match
                    </button>
                </div>
                <p class="text-center text-label-md text-text-muted mt-2">AI will automatically rank matching candidates after posting.</p>
            </div>

        </form>
    </div>
</main>

</body>
</html>
